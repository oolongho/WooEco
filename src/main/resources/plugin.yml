name: WooEco
version: ${project.version}
main: com.oolonghoo.wooeco.WooEco
api-version: '1.21'
folia-supported: true
provides: [XConomy]
author: oolongho
description: A simple economy plugin

softdepend:
  - Vault
  - PlaceholderAPI

libraries:
  - com.zaxxer:HikariCP:5.1.0
  - redis.clients:jedis:5.1.0
  - com.mysql:mysql-connector-j:8.3.0

commands:
  wooeco:
    description: Main economy command
    usage: /wooeco [args]
    permission: wooeco.use
    aliases: [weco]
  pay:
    description: Pay another player
    usage: /pay <player> <amount>
    permission: wooeco.pay
  income:
    description: Check your daily income
    usage: /income
    permission: wooeco.income

permissions:
  wooeco.player:
    description: Player permissions (all basic features)
    default: true
    children:
      wooeco.use: true
      wooeco.help: true
      wooeco.balance: true
      wooeco.pay: true
      wooeco.income: true
      wooeco.history: true
      wooeco.top: true
      wooeco.paytoggle: true
  wooeco.admin:
    description: Admin permissions (all admin features)
    default: op
    children:
      wooeco.player: true
      wooeco.balance.other: true
      wooeco.income.other: true
      wooeco.history.other: true
      wooeco.paytoggle.other: true
      wooeco.admin.give: true
      wooeco.admin.take: true
      wooeco.admin.set: true
      wooeco.admin.reload: true
      wooeco.admin.debug: true
      wooeco.admin.migrate: true
      wooeco.bypass.tax: true
  wooeco.use:
    description: Basic usage permission
    default: true
  wooeco.help:
    description: View help
    default: true
  wooeco.balance:
    description: View own balance
    default: true
  wooeco.balance.other:
    description: View other players' balance
    default: op
  wooeco.pay:
    description: Permission to pay others
    default: true
  wooeco.income:
    description: View own daily income
    default: true
  wooeco.income.other:
    description: View other players' daily income
    default: op
  wooeco.history:
    description: View own transaction history
    default: true
  wooeco.history.other:
    description: View other players' transaction history
    default: op
  wooeco.top:
    description: View leaderboard
    default: true
  wooeco.paytoggle:
    description: Toggle payment receiving
    default: true
  wooeco.paytoggle.other:
    description: Toggle other players' payment receiving
    default: op
  wooeco.admin.give:
    description: Give money to players
    default: op
  wooeco.admin.take:
    description: Take money from players
    default: op
  wooeco.admin.set:
    description: Set players' balance
    default: op
  wooeco.admin.reload:
    description: Reload configuration
    default: op
  wooeco.admin.debug:
    description: Debug permission
    default: op
  wooeco.admin.migrate:
    description: Migrate data from other economy plugins
    default: op
  wooeco.bypass.tax:
    description: Bypass transaction tax
    default: op
